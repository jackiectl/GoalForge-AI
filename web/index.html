<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GoalForge ⚽</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>⚽ GoalForge</h1>
    <p class="sub">Predict the scoreline, scorers &amp; assisters from two starting lineups</p>
  </header>

  <main>
    <section class="controls">
      <div class="teampick">
        <label>Home<select id="home"></select></label>
        <span class="vs">vs</span>
        <label>Away<select id="away"></select></label>
      </div>
      <div class="opts">
        <label class="chk"><input type="checkbox" id="neutral" checked/> Neutral venue</label>
        <label class="slider">Simulations <input type="range" id="nsims" min="10000" max="100000" step="10000" value="50000"/> <span id="nsimsv">50000</span></label>
        <button id="go">Predict</button>
      </div>
      <div class="xis">
        <div class="xicol"><h3 id="homeName">Home</h3><div id="homeXI" class="xi"></div></div>
        <div class="xicol"><h3 id="awayName">Away</h3><div id="awayXI" class="xi"></div></div>
      </div>
    </section>

    <section id="results" class="results hidden">
      <h2 id="matchTitle"></h2>
      <div class="outcome" id="outcome"></div>
      <p class="score" id="score"></p>
      <div class="cols">
        <div class="col">
          <h3 id="hsTitle"></h3><div id="homeScorers" class="bars"></div>
          <h3 id="haTitle"></h3><div id="homeAssists" class="bars"></div>
        </div>
        <div class="col">
          <h3 id="asTitle"></h3><div id="awayScorers" class="bars"></div>
          <h3 id="aaTitle"></h3><div id="awayAssists" class="bars"></div>
        </div>
      </div>
    </section>
    <p id="err" class="err"></p>
  </main>

  <footer>
    Data: StatsBomb open data (attribution: StatsBomb) + martj42 international results.
    Research demo — not betting advice.
  </footer>
  <script src="app.js"></script>
</body>
</html>
